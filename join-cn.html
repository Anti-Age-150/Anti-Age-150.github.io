    <link rel="canonical" href="https://anti-age-150.github.io/join-cn.html" />
    <link rel="alternate" hreflang="en" href="https://anti-age-150.github.io/join.html" />
    <link rel="alternate" hreflang="zh-Hans" href="https://anti-age-150.github.io/join-cn.html" />
    <link rel="alternate" hreflang="x-default" href="https://anti-age-150.github.io/join.html" />
    <meta property="og:title" content="加入候补名单 | Go160" />
    <meta
      property="og:description"
      content="获取 Go160 关于健康寿命、衰老科学与长寿未来的审慎更新。"
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://anti-age-150.github.io/join-cn.html" />
    <meta property="og:image" content="https://anti-age-150.github.io/src/images/longevity-cells.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&family=Space+Grotesk:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
    <script defer src="site.js"></script>
  </head>
  <body>
    <div class="page-shell">
      <header class="site-header" data-site-header>
        <a class="brand" href="index-cn.html" aria-label="Go160 中文首页">
          <span class="brand-mark">
            <img src="src/images/160-logo-futuristic.png" alt="" width="1774" height="887" />
          </span>
          <span class="brand-copy">
            <strong>Go160</strong>
            <span>健康寿命研究</span>
          </span>
        </a>

        <button class="nav-toggle" type="button" aria-expanded="false" aria-controls="site-nav">
          <span></span>
          <span></span>
          <span></span>
          <span class="sr-only">打开导航</span>
        </button>

        <nav class="site-nav" id="site-nav" data-site-nav>
          <div class="site-nav-main">
            <a href="index-cn.html">首页</a>
            <a href="science-cn.html">科学</a>
            <a href="join-cn.html" aria-current="page">加入</a>
          </div>
          <div class="site-nav-lang" aria-label="语言切换">
            <a href="join.html">English</a>
            <span>|</span>
            <a href="join-cn.html" aria-current="page">中文</a>
          </div>
        </nav>
      </header>

      <main>
        <section class="section page-hero">
          <p class="eyebrow">加入候补名单</p>
          <h1>接收下一期 Go160 研究笔记。</h1>
          <p class="lede">
            订阅关于健康寿命、衰老生物学和 Go160 双语长寿项目发展的审慎更新。
          </p>
        </section>

        <section class="section form-layout">
          <form
            class="waitlist-form"
            data-waitlist-form
            data-language="zh-Hans"
            data-success="您已加入候补名单。Go160 准备好后会发送审慎更新。"
            data-local-success="您已加入候补名单。当前预览已在本地保存提交，待正式接口接入后即可发送。"
            data-error="现在暂时无法提交，请稍后再试。"
          >
            <label>
              <span>姓名</span>
              <input name="name" type="text" autocomplete="name" placeholder="您的姓名" />
            </label>
            <label>
              <span>邮箱</span>
              <input name="email" type="email" autocomplete="email" required placeholder="you@example.com" />
            </label>
            <label>
              <span>关注方向</span>
              <select name="interest">
                <option>健康寿命研究</option>
                <option>衰老生物学简报</option>
                <option>社区与产品动态</option>
                <option>合作或媒体咨询</option>
              </select>
            </label>
            <label>
              <span>备注</span>
              <textarea name="notes" rows="5" placeholder="你希望 Go160 接下来讨论哪些主题？"></textarea>
            </label>
            <p class="consent-copy">
              加入即表示您同意接收 Go160 的不定期更新。本网站仅供信息参考，不提供医疗建议。
            </p>
            <button class="button button-primary" type="submit">加入候补名单</button>
            <p class="form-status" data-form-status aria-live="polite"></p>
          </form>

          <aside class="copy-panel">
            <p class="eyebrow">你会收到什么</p>
            <h2>审慎更新，而不是嘈杂承诺。</h2>
            <p>内容会包括研究主题、证据质量、双语文章，以及未来 Go160 社区功能。</p>
            <p>我们不会把长寿包装成保证结果，也不会用消费级建议替代临床指导。</p>
            <a class="text-link" href="science-cn.html">查看科学表达方式</a>
          </aside>
        </section>
      </main>

      <footer class="site-footer">
        <p>Go160 仅供信息参考，不提供医疗建议。</p>
        <p>
          <a href="index-cn.html">首页</a>
          <span>·</span>
          <a href="science-cn.html">科学</a>
          <span>·</span>
          <a href="join.html">English</a>
        </p>
      </footer>
    </div>
  </body>
